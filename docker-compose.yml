services:

  python_service:
    build: ./python_service
    container_name: python_service
    ports:
      - "8000:8000"
    volumes:
      - ./python_service/uploads:/app/uploads
    restart: always

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    depends_on:
      - python_service
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always